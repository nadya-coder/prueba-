<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurisHack | Visualizador de Contenido</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); margin-bottom: 5px; }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--card);
            color: var(--text);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .preview-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
        }

        .badge {
            background: var(--primary);
            color: black;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .content-box {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .prompt-area {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #00ff88;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .preview-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>TurisHack Hub</h1>
            <p>Pega aquí el contenido generado por la IA</p>
        </header>

        <textarea id="inputText" placeholder="Copia aquí la respuesta de Gemini..."></textarea>
        <button onclick="visualizar()">Visualizar Contenido</button>

        <div id="displayArea" class="preview-grid">
            <!-- Aquí se cargará el contenido -->
        </div>
    </div>

    <script>
        function visualizar() {
            const text = document.getElementById('inputText').value;
            const display = document.getElementById('displayArea');
            
            if(!text) return alert("Pega algo primero");

            // Simulación de separación de contenido básica
            const displayHTML = `
                <div class="preview-card">
                    <span class="badge">VISTA PREVIA RRSS</span>
                    <div class="content-box">${text}</div>
                </div>
                
                <div class="preview-card">
                    <span class="badge">PROMPT PARA IA GENERATIVA</span>
                    <div class="prompt-area">
                        /imagine prompt: Cinematic 3D render of Hacki mascot in a high-tech tourism office, neon lighting, 8k resolution --ar 16:9
                    </div>
                    <p style="font-size:12px; margin-top:10px; color:#888;">Copia este prompt en Midjourney o Canva para la imagen.</p>
                </div>
            `;
            
            display.innerHTML = displayHTML;
        }
    </script>
</body>
</html>
